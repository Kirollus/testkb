name: Deploy KB to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Stamp build metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          import os, re, json
          from datetime import datetime, UTC

          build_version = os.environ['GITHUB_SHA']
          updated_at = datetime.now(UTC).strftime('%d %b %Y %H:%M UTC')

          kb_file = Path('kb-data.js')
          text = kb_file.read_text(encoding='utf-8')
          text = text.replace('__BUILD_VERSION__', build_version)
          text = re.sub(
              r'window\.KB_LAST_UPDATED = ".*?";',
              f'window.KB_LAST_UPDATED = "{updated_at}";',
              text,
              count=1,
          )
          kb_file.write_text(text, encoding='utf-8')

          Path('version.json').write_text(
              json.dumps({'version': build_version, 'updatedAt': updated_at}, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
